<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arwest Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.14), transparent 30%),
        linear-gradient(135deg, #f4efe4 0%, #e9edf3 45%, #dfe6ee 100%);
      color: #1f2933;
    }

    .container {
      max-width: 560px;
      margin: 40px auto;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(248, 250, 252, 0.95));
      padding: 28px;
      border-radius: 22px;
      border: 1px solid rgba(181, 145, 58, 0.24);
      box-shadow: 0 18px 45px rgba(22, 34, 51, 0.16);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin: 4px 0 26px;
      padding: 12px 14px 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(243, 247, 252, 0.72));
      border-radius: 18px;
      border-bottom: 1px solid rgba(184, 145, 44, 0.16);
    }

    .brand-identity {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      margin: 0 auto;
    }

    .brand-mark {
      width: 52px;
      margin: 0;
      flex-shrink: 0;
    }

    .brand-mark img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 6px 12px rgba(45, 74, 160, 0.12));
    }

    .brand-text {
      text-align: center;
      white-space: nowrap;
    }

    .brand-title {
      margin: 0;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.03em;
      color: #2d4aa0;
      text-transform: none;
      line-height: 1.1;
    }

    .brand-kicker {
      margin: 4px 0 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8a6a16;
    }

    .headline {
      text-align: center;
      margin: 0 auto 26px;
      max-width: 360px;
    }

    .sub-brand {
      text-align: center;
      margin: -4px 0 18px;
    }

    .sub-brand img {
      width: 150px;
      max-width: 100%;
      height: auto;
      display: inline-block;
    }

    h1, h2 {
      text-align: center;
      color: #8a6a16;
      letter-spacing: 0.03em;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 38px;
      font-weight: 800;
      line-height: 1.1;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #52606d;
      line-height: 1.6;
      margin: 0;
    }

    .headline p b {
      color: #243b53;
    }

    label {
      margin-top: 15px;
      display: block;
      font-weight: bold;
      color: #243b53;
    }

    select, textarea, input {
      width: 100%;
      padding: 12px 14px;
      margin-top: 6px;
      border-radius: 12px;
      border: 1px solid #c8d0d9;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.92);
      color: #102a43;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    select:focus, textarea:focus, input:focus {
      outline: none;
      border-color: #b8912c;
      box-shadow: 0 0 0 4px rgba(184, 145, 44, 0.14);
      transform: translateY(-1px);
    }

    textarea {
      resize: none;
      height: 110px;
    }

    .rating {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      gap: 8px;
    }

    .rating span {
      font-size: 34px;
      cursor: pointer;
      color: #d4af37;
      opacity: 0.35;
      transition: transform 0.2s ease, opacity 0.2s ease, text-shadow 0.2s ease;
      user-select: none;
    }

    .rating span.active {
      opacity: 1;
      transform: scale(1.08);
      text-shadow: 0 6px 16px rgba(212, 175, 55, 0.35);
    }

    .rating-text {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #8a6a16;
      min-height: 20px;
      letter-spacing: 0.02em;
    }

    .btn {
      margin-top: 20px;
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #b8912c, #8a6a16);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(138, 106, 22, 0.22);
    }

    .btn:hover {
      background: linear-gradient(135deg, #c9a43f, #97731c);
    }

    .btn.secondary {
      background: linear-gradient(135deg, #1f3c56, #102a43);
      box-shadow: 0 12px 24px rgba(16, 42, 67, 0.22);
    }

    .btn.secondary:hover {
      background: linear-gradient(135deg, #274c6b, #163652);
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    .lock-btn {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #b8912c, #8a6a16);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(138, 106, 22, 0.2);
    }

    .lock-btn:hover {
      background: linear-gradient(135deg, #c9a43f, #97731c);
    }

    .admin-panel {
      display: none;
    }

    .admin-panel.unlocked {
      display: block;
    }

    .lock-status {
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      color: #52606d;
    }

    .history {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid rgba(181, 145, 58, 0.18);
    }

    .history-list {
      margin-top: 15px;
      display: grid;
      gap: 12px;
    }

    .history-item {
      border: 1px solid rgba(181, 145, 58, 0.2);
      border-radius: 14px;
      padding: 14px;
      background: linear-gradient(180deg, #ffffff, #f8f7f2);
      line-height: 1.6;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
    }

    .history-empty {
      text-align: center;
      color: #7b8794;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .container {
        margin: 18px;
        padding: 22px;
      }

      .brand {
        align-items: flex-start;
        gap: 12px;
        padding: 10px 12px 16px;
      }

      .brand-identity {
        width: 100%;
      }

      .brand-mark {
        width: 46px;
      }

      .brand-title {
        font-size: 15px;
        letter-spacing: 0.03em;
      }

      .brand-kicker {
        font-size: 10px;
        letter-spacing: 0.12em;
      }

      h1 {
        font-size: 30px;
      }
    }

    .footer {
      text-align: center;
      font-size: 12px;
      margin-top: 20px;
      color: #7b8794;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <button type="button" class="lock-btn" id="lockBtn" title="Enter 4-digit lock">🔒</button>
    </div>

    <div class="brand">
      <div class="brand-identity">
        <div class="brand-mark">
          <img src="Public/images/logo.png" alt="Talme logo">
        </div>
        <div class="brand-text">
          <p class="brand-title">Talme Technologies Pvt Ltd</p>
          <p class="brand-kicker">Corporate Dining Partner</p>
        </div>
      </div>
    </div>

    <div class="sub-brand">
      <img src="Public/arwest.png" alt="Arwest logo">
    </div>

    <div class="headline">
      <h1>Arwest Feedback</h1>
      <p>The Food Experience <br> <b>A unit of Talme Technologies</b></p>
    </div>

    <form id="feedbackForm">
      <label for="customerName">Your Name</label>
      <input id="customerName" type="text" placeholder="Enter your name" required>

      <label for="employeeId">Employee ID</label>
      <input id="employeeId" type="text" placeholder="Enter employee ID" required>

      <label for="orderItem">What did you order?</label>
      <select id="orderItem">
        <option>Veg Mini Meals</option>
        <option>Veg Full Meal</option>
        <option>Veg Chapati Combo</option>
        <option>Curd Rice</option>
        <option>Chicken Chapati Combo</option>
        <option>Chicken Rice</option>
        <option>Chicken Biryani</option>
        <option>Chicken Gravy</option>
        <option>Plain Rice</option>
        <option>Chapati Gravy</option>
      </select>

      <label>Rate your experience</label>
      <div class="rating" id="ratingStars">
        <span data-value="1" onclick="rate(1)">★</span>
        <span data-value="2" onclick="rate(2)">★</span>
        <span data-value="3" onclick="rate(3)">★</span>
        <span data-value="4" onclick="rate(4)">★</span>
        <span data-value="5" onclick="rate(5)">★</span>
      </div>

      <div class="rating-text" id="ratingText">Select your rating</div>
      <input type="hidden" id="ratingValue">

      <label for="feedbackMessage">Feedback</label>
      <textarea id="feedbackMessage" placeholder="Tell us your experience..." required></textarea>

      <button type="submit" class="btn">Submit Feedback</button>
    </form>

    <div class="lock-status" id="lockStatus">Feedback history is locked.</div>

    <div class="admin-panel" id="adminPanel">
      <button type="button" class="btn secondary" id="downloadBtn">Download Excel Sheet</button>

      <div class="history">
        <h2>Feedback History</h2>
        <div id="historyList" class="history-list"></div>
      </div>
    </div>

    <div class="footer">
      UB City, Bangalore <br>
      www.talme.com
    </div>
  </div>

  <script>
    const STORAGE_KEY = "arwest-feedback-history";
    const LOCK_PIN = "1234";
    const form = document.getElementById("feedbackForm");
    const historyList = document.getElementById("historyList");
    const ratingInput = document.getElementById("ratingValue");
    const ratingText = document.getElementById("ratingText");
    const adminPanel = document.getElementById("adminPanel");
    const lockStatus = document.getElementById("lockStatus");
    let isUnlocked = false;

    function getStoredFeedback() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }

    function saveStoredFeedback(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function setLockState(unlocked) {
      isUnlocked = unlocked;
      adminPanel.classList.toggle("unlocked", unlocked);
      lockStatus.textContent = unlocked
        ? "Feedback history is unlocked."
        : "Feedback history is locked.";
      document.getElementById("lockBtn").textContent = unlocked ? "🔓" : "🔒";
    }

    function getRatingLabel(value) {
      const labels = {
        1: "Poor",
        2: "Bad",
        3: "Average",
        4: "Good",
        5: "Excellent"
      };

      return labels[value] || "Select your rating";
    }

    function rate(value) {
      ratingInput.value = value;
      ratingText.textContent = getRatingLabel(value);

      document.querySelectorAll("#ratingStars span").forEach(function(star) {
        const starValue = Number(star.dataset.value);
        star.classList.toggle("active", starValue <= value);
      });
    }

    function renderHistory() {
      const items = getStoredFeedback();

      if (!items.length) {
        historyList.innerHTML = '<div class="history-empty">No feedback submitted yet.</div>';
        return;
      }

      historyList.innerHTML = items.slice().reverse().map(function(item) {
        return `
          <div class="history-item">
            <strong>${item.name}</strong><br>
            Employee ID: ${item.employeeId || "-"}<br>
            Ordered: ${item.order}<br>
            Rating: ${item.rating}/5<br>
            Feedback: ${item.feedback}<br>
            Date: ${item.date}
          </div>
        `;
      }).join("");
    }

    function escapeCsv(value) {
      return '"' + String(value).replace(/"/g, '""') + '"';
    }

    function downloadCsv() {
      if (!isUnlocked) {
        alert("Enter the 4-digit lock to download feedback history.");
        return;
      }

      const items = getStoredFeedback();

      if (!items.length) {
        alert("No feedback history found to download.");
        return;
      }

      const rows = [
        ["Name", "Employee ID", "Order", "Rating", "Feedback", "Date"],
        ...items.map(function(item) {
          return [item.name, item.employeeId || "", item.order, item.rating, item.feedback, item.date];
        })
      ];

      const csvContent = rows.map(function(row) {
        return row.map(escapeCsv).join(",");
      }).join("\n");

      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "feedback-history.csv";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      if (!ratingInput.value) {
        alert("Please select a rating before submitting.");
        return;
      }

      const feedbackEntry = {
        name: document.getElementById("customerName").value.trim(),
        employeeId: document.getElementById("employeeId").value.trim(),
        order: document.getElementById("orderItem").value,
        rating: ratingInput.value,
        feedback: document.getElementById("feedbackMessage").value.trim(),
        date: new Date().toLocaleString()
      };

      const items = getStoredFeedback();
      items.push(feedbackEntry);
      saveStoredFeedback(items);
      renderHistory();
      form.reset();
      ratingInput.value = "";
      ratingText.textContent = "Select your rating";

      document.querySelectorAll("#ratingStars span").forEach(function(star) {
        star.classList.remove("active");
      });

      alert("Thank you! Your feedback has been saved.");
    });

    document.getElementById("lockBtn").addEventListener("click", function() {
      if (isUnlocked) {
        setLockState(false);
        return;
      }

      const enteredPin = window.prompt("Enter 4-digit lock to view feedback history:");
      if (enteredPin === null) {
        return;
      }

      if (/^\d{4}$/.test(enteredPin) && enteredPin === LOCK_PIN) {
        setLockState(true);
        renderHistory();
      } else {
        alert("Wrong lock. Please enter the correct 4-digit code.");
      }
    });

    document.getElementById("downloadBtn").addEventListener("click", downloadCsv);

    setLockState(false);
  </script>
</body>
</html>
