<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sugar Daddy Waffle Feedback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: radial-gradient(circle at top left, rgba(68,45,28,0.18), transparent 30%), linear-gradient(135deg, #f4ede4 0%, #efe6dc 46%, #e9ddd0 100%); color: #2b211c; }
    .container { max-width: 560px; margin: 40px auto; background: linear-gradient(180deg, rgba(255,251,246,0.98), rgba(248,241,234,0.96)); padding: 28px; border-radius: 22px; border: 1px solid rgba(92,57,35,0.18); box-shadow: 0 18px 45px rgba(45,28,16,0.16); }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .home-link { text-decoration: none; color: #6b4327; font-weight: 700; font-size: 14px; }
    .lock-btn { width: 46px; height: 46px; border: none; border-radius: 50%; background: linear-gradient(135deg, #7f5433, #4e311e); color: #fff; font-size: 20px; cursor: pointer; }
    .brand { display: flex; align-items: center; justify-content: center; gap: 18px; margin: 4px 0 26px; padding: 12px 14px 18px; background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(250,243,236,0.78)); border-radius: 18px; border-bottom: 1px solid rgba(92,57,35,0.12); }
    .brand img { width: 52px; height: auto; display: block; }
    .brand-title { margin: 0; font-size: 19px; font-weight: 800; color: #7f5433; line-height: 1.1; text-align: center; }
    .brand-kicker { margin: 4px 0 0; font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #9a6d3f; text-align: center; }
    .form-card { padding: 18px; border-radius: 18px; border: 1px solid rgba(92,57,35,0.14); background: linear-gradient(180deg, rgba(255,252,248,0.96), rgba(250,244,238,0.96)); box-shadow: 0 12px 28px rgba(45,28,16,0.08); }
    .panel-brand, .headline, h2, p, .rating-text, .lock-status, .data-status, .footer, .history-empty { text-align: center; }
    .panel-brand { margin-bottom: 14px; }
    .sugar-logo { display: inline-block; font-family: "Brush Script MT", "Segoe Script", cursive; font-size: 48px; line-height: 0.9; color: #2b211c; transform: rotate(-6deg); }
    .sugar-logo span { display: block; }
    h1, h2 { color: #6b4327; letter-spacing: 0.03em; }
    h1 { margin: 0 0 10px; font-size: 38px; line-height: 1.1; }
    p { margin: 0; color: #5c4b40; line-height: 1.6; }
    .headline { margin-bottom: 24px; }
    label { margin-top: 15px; display: block; font-weight: bold; color: #3b2c23; }
    select, textarea, input { width: 100%; padding: 12px 14px; margin-top: 6px; border-radius: 12px; border: 1px solid #d6c8bc; box-sizing: border-box; background: rgba(255,255,255,0.92); color: #2b211c; }
    textarea { resize: none; height: 110px; }
    .rating { display: flex; justify-content: space-between; margin-top: 12px; gap: 8px; }
    .rating span { font-size: 34px; cursor: pointer; color: #b87932; opacity: 0.35; user-select: none; }
    .rating span.active { opacity: 1; transform: scale(1.08); }
    .rating-text { margin-top: 10px; font-size: 14px; font-weight: 600; color: #7f5433; min-height: 20px; }
    .btn { margin-top: 20px; width: 100%; padding: 13px; background: linear-gradient(135deg, #7f5433, #4e311e); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn.secondary { background: linear-gradient(135deg, #3c2d23, #1f1711); }
    .lock-status { margin-top: 10px; font-size: 13px; color: #5c4b40; }
    .data-status { margin-top: 8px; font-size: 12px; color: #7f6c5f; }
    .admin-panel { display: none; }
    .admin-panel.unlocked { display: block; }
    .history { margin-top: 28px; padding-top: 18px; border-top: 1px solid rgba(92,57,35,0.14); }
    .history-list { margin-top: 15px; display: grid; gap: 12px; }
    .history-item { border: 1px solid rgba(92,57,35,0.16); border-radius: 14px; padding: 14px; background: linear-gradient(180deg, #fffdfa, #f6efe8); line-height: 1.6; box-shadow: 0 8px 18px rgba(45,28,16,0.06); }
    .footer { font-size: 12px; margin-top: 20px; color: #7f6c5f; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar"><a class="home-link" href="index.html">Back</a><button type="button" class="lock-btn" id="lockBtn" title="Enter 4-digit lock">&#128274;</button></div>
    <div class="brand"><img src="Public/images/logo.png" alt="Talme logo"><div><p class="brand-title">Talme Technologies Pvt Ltd</p><p class="brand-kicker">Corporate Dining Partner</p></div></div>
    <div class="form-card">
      <div class="panel-brand"><div class="sugar-logo"><span>Sugar</span><span>Daddy</span></div></div>
      <div class="headline"><h1>Waffle Feedback</h1><p>Share your experience for the Sugar Daddy waffle menu.</p></div>
      <form id="feedbackForm">
        <label for="customerName">Your Name</label><input id="customerName" type="text" placeholder="Enter your name" required>
        <label for="employeeId">Employee ID</label><input id="employeeId" type="text" placeholder="Enter employee ID" required>
        <label for="orderItem">Which waffle did you order?</label>
        <select id="orderItem"><option>Honey Butter / Maple Butter</option><option>Red Velvet</option><option>Belgian Dark / Milk Chocolate Ecstasy</option><option>Naked Nutella</option><option>Triple Dark Overload</option><option>Dark and White</option><option>White Chocolate Oreo</option><option>Dusk &amp; Dawn</option><option>Mocha Waffle</option><option>Caramel Waffle</option></select>
        <label>Rate your waffle experience</label>
        <div class="rating" id="ratingStars"><span data-value="1">&#9733;</span><span data-value="2">&#9733;</span><span data-value="3">&#9733;</span><span data-value="4">&#9733;</span><span data-value="5">&#9733;</span></div>
        <div class="rating-text" id="ratingText">Select your rating</div>
        <input type="hidden" id="ratingValue">
        <label for="feedbackMessage">Feedback</label><textarea id="feedbackMessage" placeholder="Tell us what you liked or what should improve..." required></textarea>
        <button type="submit" class="btn">Submit Waffle Feedback</button>
      </form>
    </div>
    <div class="lock-status" id="lockStatus">Waffle feedback history is locked.</div>
    <div class="data-status" id="dataStatus">History mode: Local browser storage</div>
    <div class="admin-panel" id="adminPanel"><button type="button" class="btn secondary" id="downloadBtn">Download Waffle Excel Sheet</button><div class="history"><h2>Waffle Feedback History</h2><div id="historyList" class="history-list"></div></div></div>
    <div class="footer">UB City, Bangalore <br>www.talme.com</div>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { addDoc, collection, getDocs, getFirestore, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
    const STORAGE_KEY = "sugar-daddy-waffle-feedback-history";
    const COLLECTION_NAME = "feedbackHistory";
    const DOWNLOAD_NAME = "waffle-feedback-history.csv";
    const FEEDBACK_TYPE = "waffles";
    const LOCK_PIN = "1234";
    const FIREBASE_CONFIG = { apiKey: "AIzaSyDFeq3PRqmxn_BTchXaFzIrQXKTqUx1nM8", authDomain: "feed-back-talme.firebaseapp.com", projectId: "feed-back-talme", storageBucket: "feed-back-talme.firebasestorage.app", messagingSenderId: "413910206801", appId: "1:413910206801:web:a8cfb847a90c708409ab70" };
    const form = document.getElementById("feedbackForm"); const historyList = document.getElementById("historyList"); const ratingInput = document.getElementById("ratingValue"); const ratingText = document.getElementById("ratingText"); const adminPanel = document.getElementById("adminPanel"); const lockStatus = document.getElementById("lockStatus"); const lockButton = document.getElementById("lockBtn"); const dataStatus = document.getElementById("dataStatus");
    let firestoreDb = null; let feedbackItems = []; let isUnlocked = false;
    if (Object.values(FIREBASE_CONFIG).every(Boolean)) { const app = initializeApp(FIREBASE_CONFIG); firestoreDb = getFirestore(app); dataStatus.textContent = "History mode: Firebase shared database"; }
    function getLocalFeedback() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
    function saveLocalFeedback(items) { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }
    async function loadFeedback() { if (!firestoreDb) { feedbackItems = getLocalFeedback().slice().reverse(); renderHistory(); return; } try { const feedbackQuery = query(collection(firestoreDb, COLLECTION_NAME), orderBy("createdAt", "desc")); const snapshot = await getDocs(feedbackQuery); feedbackItems = snapshot.docs.map(function(doc) { const item = doc.data(); return { feedbackType: item.feedbackType || item.formType || "", name: item.name || "", employeeId: item.employeeId || "", order: item.order || "", rating: item.rating || "", feedback: item.feedback || "", date: item.date || "" }; }).filter(function(item) { return item.feedbackType === FEEDBACK_TYPE || item.feedbackType === "Waffle Feedback"; }); renderHistory(); } catch (error) { dataStatus.textContent = "History mode: Firebase error. Showing local browser fallback."; feedbackItems = getLocalFeedback().slice().reverse(); renderHistory(); } }
    async function persistFeedback(entry) { if (!firestoreDb) { const items = getLocalFeedback(); items.push(entry); saveLocalFeedback(items); feedbackItems = items.slice().reverse(); return; } await addDoc(collection(firestoreDb, COLLECTION_NAME), { ...entry, feedbackType: FEEDBACK_TYPE, formType: "Waffle Feedback", createdAt: serverTimestamp() }); await loadFeedback(); }
    function setLockState(unlocked) { isUnlocked = unlocked; adminPanel.classList.toggle("unlocked", unlocked); lockStatus.textContent = unlocked ? "Waffle feedback history is unlocked." : "Waffle feedback history is locked."; lockButton.textContent = unlocked ? "\uD83D\uDD13" : "\uD83D\uDD12"; }
    function getRatingLabel(value) { const labels = {1:"Poor",2:"Bad",3:"Average",4:"Good",5:"Excellent"}; return labels[value] || "Select your rating"; }
    document.querySelectorAll("#ratingStars span").forEach(function(star) { star.addEventListener("click", function() { const value = Number(star.dataset.value); ratingInput.value = value; ratingText.textContent = getRatingLabel(value); document.querySelectorAll("#ratingStars span").forEach(function(item) { item.classList.toggle("active", Number(item.dataset.value) <= value); }); }); });
    function renderHistory() { if (!feedbackItems.length) { historyList.innerHTML = '<div class="history-empty">No waffle feedback submitted yet.</div>'; return; } historyList.innerHTML = feedbackItems.map(function(item) { return `<div class="history-item"><strong>${item.name}</strong><br>Employee ID: ${item.employeeId || "-"}<br>Ordered: ${item.order}<br>Rating: ${item.rating}/5<br>Feedback: ${item.feedback}<br>Date: ${item.date}</div>`; }).join(""); }
    function escapeCsv(value) { return '"' + String(value).replace(/"/g, '""') + '"'; }
    function downloadCsv() { if (!isUnlocked) { alert("Enter the 4-digit lock to download waffle feedback history."); return; } if (!feedbackItems.length) { alert("No waffle feedback history found to download."); return; } const rows = [["Name","Employee ID","Order","Rating","Feedback","Date"], ...feedbackItems.map(function(item) { return [item.name, item.employeeId || "", item.order, item.rating, item.feedback, item.date]; })]; const csvContent = rows.map(function(row) { return row.map(escapeCsv).join(","); }).join("\n"); const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" }); const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.href = url; link.download = DOWNLOAD_NAME; document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url); }
    form.addEventListener("submit", async function(event) { event.preventDefault(); if (!ratingInput.value) { alert("Please select a rating before submitting."); return; } const feedbackEntry = { feedbackType: FEEDBACK_TYPE, formType: "Waffle Feedback", name: document.getElementById("customerName").value.trim(), employeeId: document.getElementById("employeeId").value.trim(), order: document.getElementById("orderItem").value, rating: ratingInput.value, feedback: document.getElementById("feedbackMessage").value.trim(), date: new Date().toLocaleString() }; try { await persistFeedback(feedbackEntry); renderHistory(); form.reset(); ratingInput.value = ""; ratingText.textContent = "Select your rating"; document.querySelectorAll("#ratingStars span").forEach(function(star) { star.classList.remove("active"); }); alert("Thank you! Your feedback has been saved."); } catch (error) { alert("Feedback could not be saved. Please check your Firebase setup."); } });
    lockButton.addEventListener("click", function() { if (isUnlocked) { setLockState(false); return; } const enteredPin = window.prompt("Enter 4-digit lock to view waffle feedback history:"); if (enteredPin === null) { return; } if (/^\d{4}$/.test(enteredPin) && enteredPin === LOCK_PIN) { setLockState(true); loadFeedback(); } else { alert("Wrong lock. Please enter the correct 4-digit code."); } });
    document.getElementById("downloadBtn").addEventListener("click", downloadCsv); setLockState(false); loadFeedback();
  </script>
</body>
</html>
